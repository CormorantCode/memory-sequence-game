<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Sequence Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="game-container">
        <div id="game-board">
            <button class="button button-1" data-id="0"></button>
            <button class="button button-2" data-id="1"></button>
            <button class="button button-3" data-id="2"></button>
            <button class="button button-4" data-id="3"></button>
            <button class="button button-5" data-id="4"></button>
            <div id="center-circle">
                <div id="center-display">Start</div>
            </div>
        </div>
        <div id="step-counter">
            <div class="sc-cell" id="sc-play">
                <span class="sc-label">Play</span>
                <span class="sc-value" id="sc-play-val">—</span>
            </div>
            <div class="sc-cell" id="sc-round">
                <span class="sc-label">Round</span>
                <span class="sc-value" id="sc-round-val">—</span>
            </div>
            <div class="sc-cell" id="sc-step">
                <span class="sc-label">Step</span>
                <span class="sc-value" id="sc-step-val">— of —</span>
            </div>
            <div class="sc-cell" id="sc-best">
                <span class="sc-label">Best</span>
                <span class="sc-value" id="sc-best-val">—</span>
            </div>
        </div>
        <div id="progress-tracker"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Flower Sequence Game</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <div class="game-container">

        <div id="flower-board">

            <button
                class="petal petal-1"
                data-id="0">
            </button>

            <button
                class="petal petal-2"
                data-id="1">
            </button>

            <button
                class="petal petal-3"
                data-id="2">
            </button>

            <button
                class="petal petal-4"
                data-id="3">
            </button>

            <button
                class="petal petal-5"
                data-id="4">
            </button>

            <div id="center-circle">

                <div id="center-display">
                    Start
                </div>

            </div>

        </div>

        <div id="progress-tracker"></div>
        
    </div>

    <script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Sequence Memory</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <div class="game-container">

        <h1>Sequence Memory</h1>

        <div class="stats">

            <span>
                Score:
                <span id="score">0</span>
            </span>

            <span>
                Best:
                <span id="best-score">0</span>
            </span>

        </div>

        <div class="board">

            <button
                class="game-button top-left"
                data-id="0">
            </button>

            <button
                class="game-button top-right"
                data-id="1">
            </button>

            <button
                class="game-button bottom-left"
                data-id="2">
            </button>

            <button
                class="game-button bottom-right"
                data-id="3">
            </button>

            <div id="center-display">
                Start
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>

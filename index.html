<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Sequence Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="game-header">
        <button id="header-btn" class="header-play-btn">Play</button>
        <div id="header-center">
            <div id="header-instructions">Watch the sequence, then repeat it.<br>Builds from 3 to 20 steps.</div>
            <div id="header-replay" class="hidden">
                <label class="replay-option">
                    <input type="radio" name="replay-from" value="beginning" checked>
                    From Beginning
                </label>
                <label class="replay-option">
                    <input type="radio" name="replay-from" value="last">
                    <span id="replay-last-label">From Last Round</span>
                </label>
            </div>
        </div>
        <div class="header-icons">
            <button class="icon-btn" id="stats-btn" title="Stats">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="3" width="4" height="18"/></svg>
            </button>
            <button class="icon-btn" id="help-btn" title="Help">?</button>
        </div>
    </header>
    <div class="game-container">
        <div id="game-board">
            <button class="button button-1" data-id="0"></button>
            <button class="button button-2" data-id="1"></button>
            <button class="button button-3" data-id="2"></button>
            <button class="button button-4" data-id="3"></button>
            <button class="button button-5" data-id="4"></button>
            <div id="center-circle">
                <div id="center-display">Tap Play<br>to start</div>
            </div>
        </div>
        <div id="tracker-wrap">
            <div id="step-counter">
                <div class="sc-cell" id="sc-play">
                    <span class="sc-label">Play</span>
                    <span class="sc-value" id="sc-play-val">—</span>
                </div>
                <div class="sc-cell" id="sc-round">
                    <span class="sc-label">Round</span>
                    <span class="sc-value" id="sc-round-val">—</span>
                </div>
                <div class="sc-cell" id="sc-step">
                    <span class="sc-label">Step</span>
                    <span class="sc-value" id="sc-step-val">— of —</span>
                </div>
                <div class="sc-cell" id="sc-best">
                    <span class="sc-label">Best</span>
                    <span class="sc-value" id="sc-best-val">—</span>
                </div>
            </div>
            <div id="progress-tracker"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
